services:
  podbooth:
    image: ghcr.io/fuzzymistborn/podbooth:latest
    # Uncomment to build locally instead of using the prebuilt image:
    # build: .
    container_name: podbooth-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./recordings:/recordings
    depends_on:
      - podbooth-livekit

    # ── Option A: .env file ─────────────────────────────────────────────
    # Copy .env.example to .env, fill in your values, and leave this as-is.
    env_file: .env

    # ── Option B: inline variables ──────────────────────────────────────
    # Comment out env_file above and uncomment this block instead.
    # environment:
    #   # LiveKit — must match the keys block in livekit/livekit.yaml
    #   LIVEKIT_API_KEY: devkey
    #   LIVEKIT_API_SECRET: devsecret
    #   # Internal service URL — keep this as-is when using the compose stack
    #   LIVEKIT_URL: ws://livekit:7880
    #   # Public WebSocket URL that browsers connect to
    #   LIVEKIT_PUBLIC_URL: wss://your-server.example.com:7880
    #   # App settings
    #   SECRET_KEY: change-me-generate-with-openssl-rand-base64-32
    #   BASE_URL: https://your-server.example.com
    #   RECORDINGS_DIR: /recordings
    #   # Timezone for session timestamps and recording folder dates (e.g. America/New_York)
    #   TZ: UTC
    #   # Uncomment to require a password for the host UI:
    #   # HOST_PASSWORD: your-password
    #   # Transcription (WhisperX) — leave unset to disable:
    #   # WHISPERX_API_URL: http://whisperx:8000
    #   # WHISPERX_MODEL: large-v3-turbo
    #   # WHISPERX_LANGUAGE: en
    #   # Nextcloud upload — set URL + credentials to enable:
    #   # NEXTCLOUD_URL: https://nextcloud.example.com
    #   # NEXTCLOUD_USER: myuser
    #   # NEXTCLOUD_PASSWORD: mypassword
    #   # NEXTCLOUD_UPLOAD_PATH: PodBooth
    #   # FileBrowser upload — set URL + credentials to enable:
    #   # FILEBROWSER_URL: https://files.example.com
    #   # FILEBROWSER_USER: admin
    #   # FILEBROWSER_PASSWORD: mypassword
    #   # FILEBROWSER_UPLOAD_PATH: PodBooth
    #   # Cloudflare R2 upload — set account ID + credentials to enable:
    #   # R2_ACCOUNT_ID: abcdef1234567890abcdef1234567890
    #   # R2_ACCESS_KEY_ID: your-r2-access-key-id
    #   # R2_ACCESS_KEY_SECRET: your-r2-access-key-secret
    #   # R2_BUCKET: my-podbooth-bucket
    #   # R2_UPLOAD_PATH: PodBooth
    #   # Backblaze B2 upload — set endpoint + credentials to enable:
    #   # B2_ENDPOINT_URL: https://s3.us-west-004.backblazeb2.com
    #   # B2_ACCESS_KEY_ID: your-b2-key-id
    #   # B2_ACCESS_KEY_SECRET: your-b2-application-key
    #   # B2_BUCKET: my-podbooth-bucket
    #   # B2_UPLOAD_PATH: PodBooth

  podbooth-coturn:
    image: coturn/coturn:latest
    container_name: podbooth-coturn
    restart: unless-stopped
    network_mode: host
    command:
      - "-n"
      - "--lt-cred-mech"
      - "--fingerprint"
      - "--no-multicast-peers"
      - "--no-stdout-log"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--realm=podbooth.local"
      - "--user=${TURN_USER}:${TURN_PASSWORD}"
      - "--relay-ip=${TURN_EXTERNAL_IP}"
      - "--external-ip=${TURN_EXTERNAL_IP}"
    # If using Option B above (no .env file), replace ${TURN_*} with literal values.

  podbooth-livekit:
    image: livekit/livekit-server:latest
    container_name: podbooth-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"       # HTTP/WebSocket
      - "7881:7881"       # RTC TCP
      - "50000-50200:50000-50200/udp"  # RTC UDP range
    volumes:
      - ./livekit/livekit.yaml:/livekit.yaml
    entrypoint: ["/livekit-server"]
    command: ["--config", "/livekit.yaml"]
