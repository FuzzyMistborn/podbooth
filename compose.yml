services:
  podbooth:
    image: ghcr.io/fuzzymistborn/podbooth:latest
    # Uncomment to build locally instead of using the prebuilt image:
    # build: .
    container_name: podbooth-app
    restart: unless-stopped
    ports:
      - "8100:8000"
    volumes:
      - ./recordings:/recordings
    depends_on:
      - podbooth-livekit

    # ── Option A: .env file ─────────────────────────────────────────────
    # Copy .env.example to .env, fill in your values, and leave this as-is.
    env_file: .env

    # ── Option B: inline variables ──────────────────────────────────────
    # Comment out env_file above and uncomment this block instead.
    # environment:
    #   # LiveKit — must match the keys block in livekit/livekit.yaml
    #   LIVEKIT_API_KEY: devkey
    #   LIVEKIT_API_SECRET: devsecret
    #   # Internal service URL — keep this as-is when using the compose stack
    #   LIVEKIT_URL: ws://livekit:7880
    #   # Public WebSocket URL that browsers connect to
    #   LIVEKIT_PUBLIC_URL: wss://your-server.example.com:7880
    #   # App settings
    #   SECRET_KEY: change-me-generate-with-openssl-rand-base64-32
    #   BASE_URL: https://your-server.example.com
    #   RECORDINGS_DIR: /recordings
    #   # Timezone for session timestamps and recording folder dates (e.g. America/New_York)
    #   TZ: UTC
    #   # Uncomment to require a password for the host UI:
    #   # HOST_PASSWORD: your-password

  podbooth-coturn:
    image: coturn/coturn:latest
    container_name: podbooth-coturn
    restart: unless-stopped
    network_mode: host
    command:
      - "-n"
      - "--lt-cred-mech"
      - "--fingerprint"
      - "--no-multicast-peers"
      - "--no-stdout-log"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--realm=podbooth.local"
      - "--user=${TURN_USER}:${TURN_PASSWORD}"
      - "--relay-ip=${TURN_EXTERNAL_IP}"
      - "--external-ip=${TURN_EXTERNAL_IP}"
    # If using Option B above (no .env file), replace ${TURN_*} with literal values.

  podbooth-livekit:
    image: livekit/livekit-server:latest
    container_name: podbooth-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"       # HTTP/WebSocket
      - "7881:7881"       # RTC TCP
      - "50000-50200:50000-50200/udp"  # RTC UDP range
    volumes:
      - ./livekit/livekit.yaml:/livekit.yaml
    entrypoint: ["/livekit-server"]
    command: ["--config", "/livekit.yaml"]
