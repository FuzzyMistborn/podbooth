<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PodBooth{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css?v={{ asset_v }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="logo-wrap">
      <a href="/" class="logo">
        <img src="/static/images/logo-text.png" alt="PodBooth" class="logo-text-img" />
      </a>
      <span class="app-version">{{ app_version }}</span>
    </div>
    {% block header_right %}
    <nav>
      <a href="/dashboard">Sessions</a>
    </nav>
    {% endblock %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
